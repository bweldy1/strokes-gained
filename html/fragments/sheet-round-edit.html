<!-- ROUND EDIT SHEET -->
<div class="sheet-overlay" id="round-edit-sheet" onclick="handleRoundEditOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Round Details</div>
    <div class="sheet-body">
      <div class="form-group">
        <div class="form-label">Course Name</div>
        <input type="text" class="num-input" id="round-edit-name" style="font-size:18px" placeholder="Course name">
      </div>
      <div class="form-group">
        <div class="form-label">Date Played</div>
        <input type="date" class="date-input" id="round-edit-date">
      </div>
      <button class="btn btn-primary" onclick="saveRoundEdit()">Save</button>
    </div>
  </div>
</div>
