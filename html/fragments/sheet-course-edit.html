<!-- COURSE EDIT SHEET -->
<div class="sheet-overlay" id="course-edit-sheet" onclick="handleCourseEditOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit Course</div>
    <div class="sheet-body">
      <div class="form-group">
        <div class="form-label">Name</div>
        <input type="text" class="num-input num-input-text" id="course-edit-name" placeholder="Course name">
      </div>
      <div class="form-group">
        <div class="form-label">Tees</div>
        <input type="text" class="num-input num-input-text" id="course-edit-tees" placeholder="e.g. Blue">
      </div>
      <button class="btn btn-primary btn-mb" onclick="saveCourseEdit()">Save</button>
      <button class="btn btn-ghost" onclick="loadCourseHolesJSON()">Edit holes in JSON ›</button>
    </div>
  </div>
</div>
