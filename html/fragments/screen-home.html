<!-- HOME -->
<div class="screen active" id="screen-home" style="position: relative;">
  <div class="home-header">
    <div class="home-logo"><img src="images/SG_logo.png" class="home-logo-img" alt="SG Tracker"></div>
    <div class="home-title">Strokes<br>Gained</div>
    <div class="home-sub">Track every shot. Improve every round.</div>
  </div>
  <div class="scroll-body">
    <button class="btn btn-primary" onclick="goToNewRound()" style="margin-bottom:10px"><span>+</span> Start New Round</button>
    <button class="btn btn-secondary" onclick="showScreen('trends')" style="margin-bottom:24px">Trends</button>
    <div class="section-label">Recent Rounds</div>
    <div id="rounds-list"></div>
  </div>
  <div id="build-version">Build: <!-- BUILD_DATE --></div>
</div>
