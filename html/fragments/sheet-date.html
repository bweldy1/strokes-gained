<!-- DATE SHEET -->
<div class="sheet-overlay" id="date-sheet" onclick="handleDateOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Round Date</div>
    <div class="sheet-body">
      <div class="form-group">
        <div class="form-label">Date Played</div>
        <input type="date" class="date-input" id="round-date-input">
      </div>
      <button class="btn btn-primary" onclick="saveRoundDate()">Save</button>
    </div>
  </div>
</div>
