<!-- TRENDS -->
<div class="screen" id="screen-trends">

    <button class="btn-icon" onclick="showScreen('home')">‹</button>
    <div><div class="topbar-title">Trends</div></div>
    <div class="topbar-spacer"></div>
  </div>
  <div class="scroll-body">
    <div class="trends-filter-row">
      <button class="pill pill-sm" id="tf-5"  onclick="setTrendsFilter(5)">Last 5</button>
      <button class="pill pill-sm" id="tf-10" onclick="setTrendsFilter(10)">Last 10</button>
      <button class="pill pill-sm" id="tf-0"  onclick="setTrendsFilter(0)">All</button>
    </div>
    <div id="trends-cats"></div>
  </div>
</div>
